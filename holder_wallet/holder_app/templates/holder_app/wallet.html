<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Holder Device Wallet</title>
  <style>
    :root {
      --ink: #1b2430;
      --muted: #687386;
      --line: #d8dee9;
      --bg: #f1f4f8;
      --panel: #ffffff;
      --accent: #274c77;
      --good: #156c5a;
      --warn: #9b2c2c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(1120px, calc(100% - 32px));
      margin: 28px auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 20px;
    }
    h1, h2, h3 { margin: 0; letter-spacing: 0; }
    h1 { font-size: 30px; }
    h2 { font-size: 17px; }
    h3 { font-size: 15px; color: var(--muted); }
    p { margin: 7px 0 0; color: var(--muted); line-height: 1.5; }
    select, button {
      min-height: 42px;
      border-radius: 6px;
      font: inherit;
    }
    select {
      border: 1px solid #b9c2d2;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      min-width: 260px;
    }
    button {
      border: 0;
      padding: 0 16px;
      color: #fff;
      background: var(--accent);
      font-weight: 800;
      cursor: pointer;
    }
    button.secondary {
      background: #ffffff;
      color: var(--accent);
      border: 1px solid #b9c2d2;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }
    .credential {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 12px 26px rgba(27, 36, 48, .06);
      display: grid;
      gap: 14px;
    }
    .claim {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border-top: 1px solid #eef1f5;
      padding-top: 12px;
    }
    .claim strong { display: block; font-size: 14px; }
    .claim span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
      margin-top: 3px;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 28px;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #b8c1cf;
      transition: .2s;
      border-radius: 999px;
    }
    .slider::before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 3px;
      top: 3px;
      background: white;
      transition: .2s;
      border-radius: 50%;
      box-shadow: 0 1px 5px rgba(0,0,0,.25);
    }
    input:checked + .slider { background: var(--good); }
    input:checked + .slider::before { transform: translateX(20px); }
    pre {
      max-height: 280px;
      overflow: auto;
      background: #111827;
      color: #dbeafe;
      padding: 14px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.45;
    }
    .result {
      border: 1px solid #a7d7ca;
      background: #e8f6f2;
      color: var(--good);
      border-radius: 6px;
      padding: 12px;
      font-weight: 800;
      line-height: 1.4;
      display: none;
    }
    .result.error {
      display: block;
      color: var(--warn);
      background: #fff1f1;
      border-color: #f0b4b4;
    }
    .result.success {
      display: block;
    }
    .message { margin-top: 16px; font-weight: 800; color: var(--accent); min-height: 22px; }
    .message.error { color: var(--warn); }
    .empty {
      background: var(--panel);
      border: 1px dashed #aeb8c8;
      border-radius: 8px;
      padding: 26px;
      color: var(--muted);
    }
    @media (max-width: 720px) {
      header { align-items: stretch; flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Holder Device Wallet</h1>
        <p>Select a student wallet, choose disclosures, and submit a signed presentation to the verifier.</p>
      </div>
      <div>
        <select id="holder-select"></select>
        <button class="secondary" id="refresh">Refresh Wallet</button>
        <form id="add-holder-form" style="display:inline-block;margin-left:12px;"> 
          <input id="new-holder-id" placeholder="student_id" required style="min-width:120px;margin-left:8px;">
          <input id="new-holder-name" placeholder="Display name" style="min-width:160px;margin-left:8px;">
          <input id="new-holder-email" placeholder="Email" style="min-width:160px;margin-left:8px;">
          <button id="add-holder-button" type="submit">Add Student</button>
        </form>
      </div>
    </header>
    <div id="wallet-grid" class="grid"></div>
    <div id="message" class="message"></div>
  </main>
  <script>
    const grid = document.getElementById("wallet-grid");
    const message = document.getElementById("message");
    const refreshButton = document.getElementById("refresh");
    const holderSelect = document.getElementById("holder-select");

    function setMessage(text, isError = false) {
      message.textContent = text;
      message.classList.toggle("error", isError);
    }

    function claimRow(walletId, key, block) {
      const defaultDisclosures = [];
      const checked = defaultDisclosures.includes(key) ? "checked" : "";
      return `
        <div class="claim">
          <div>
            <strong>${key}</strong>
            <span>${block.value ?? "Hidden until disclosed"}</span>
            <span>hash ${block.hash}</span>
          </div>
          <label class="switch" aria-label="Disclose ${key}">
            <input type="checkbox" data-wallet="${walletId}" value="${key}" ${checked}>
            <span class="slider"></span>
          </label>
        </div>`;
    }

    function credentialCard(record) {
      const claims = record.credential.credentialSubject.claims;
      const rows = Object.entries(claims).map(([key, block]) => claimRow(record.wallet_id, key, block)).join("");
      return `
        <article class="credential" data-wallet-card="${record.wallet_id}">
          <div>
            <h2>${record.credential.type.join(" / ")}</h2>
            <p>${record.holder_name} (${record.holder_id})</p>
            <p>${record.credential_id}</p>
          </div>
          ${rows}
          <button data-submit="${record.wallet_id}">Compile Presentation & Submit</button>
          <div class="result" id="result-${record.wallet_id}"></div>
          <pre id="presentation-${record.wallet_id}">{}</pre>
        </article>`;
    }

    async function loadHolders() {
      const response = await fetch("/api/v1/wallet/holders/");
      const payload = await response.json();
      holderSelect.innerHTML = payload.holders.map((holder) => (
        `<option value="${holder.holder_id}">${holder.display_name} (${holder.holder_id})</option>`
      )).join("");
    }

    async function loadWallet() {
      setMessage("Loading wallet...");
      const holderId = holderSelect.value;
      const response = await fetch(`/api/v1/wallet/credentials/?holder_id=${encodeURIComponent(holderId)}`);
      const payload = await response.json();
      if (!payload.credentials.length) {
        grid.innerHTML = `<div class="empty">No credentials stored for this student yet. Use the issuer dashboard on port 8001 to sign and export one.</div>`;
        setMessage("");
        return;
      }
      grid.innerHTML = payload.credentials.map(credentialCard).join("");
      setMessage(`${payload.credentials.length} credential record(s) ready.`);
    }

    async function submitPresentation(walletId) {
      setMessage("Compiling selective presentation...");
      const disclosedKeys = Array.from(document.querySelectorAll(`input[data-wallet="${walletId}"]:checked`))
        .map(input => input.value);

      const presentationResponse = await fetch("/api/v1/wallet/presentation/generate/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ wallet_id: Number(walletId), disclosed_keys: disclosedKeys })
      });
      const presentation = await presentationResponse.json();
      if (!presentationResponse.ok) {
        throw new Error(presentation.error || "Wallet failed to build presentation.");
      }
      document.getElementById(`presentation-${walletId}`).textContent = JSON.stringify(presentation, null, 2);

      setMessage("Submitting presentation to verifier...");
      const verifierResponse = await fetch("http://127.0.0.1:8003/api/v1/verify/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(presentation)
      });
      const verification = await verifierResponse.json();
      const result = document.getElementById(`result-${walletId}`);
      const resultText = verification.valid
        ? `Verifier accepted presentation. Disclosed: ${Object.keys(verification.disclosed_claims).join(", ") || "none"}`
        : `Verifier rejected presentation: ${verification.reason}`;
      result.textContent = resultText;
      result.className = `result ${verification.valid ? "success" : "error"}`;
      setMessage(resultText, !verification.valid);
    }

    grid.addEventListener("click", async (event) => {
      const button = event.target.closest("button[data-submit]");
      if (!button) return;
      button.disabled = true;
      try {
        await submitPresentation(button.dataset.submit);
      } catch (error) {
        setMessage(error.message, true);
      } finally {
        button.disabled = false;
      }
    });

    refreshButton.addEventListener("click", loadWallet);
    holderSelect.addEventListener("change", loadWallet);
    loadHolders()
      .then(loadWallet)
      .catch(error => setMessage(error.message, true));

    // Add holder form
    const addHolderForm = document.getElementById('add-holder-form');
    addHolderForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('new-holder-id').value.trim();
      const name = document.getElementById('new-holder-name').value.trim();
      const email = document.getElementById('new-holder-email').value.trim();
      if (!id) return setMessage('student_id is required', true);
      try {
        setMessage('Adding student...');
        const resp = await fetch('/api/v1/wallet/holders/create/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ holder_id: id, display_name: name, email: email }),
        });
        const payload = await resp.json();
        if (!resp.ok) throw new Error(payload.error || 'Failed to create holder');
        await loadHolders();
        holderSelect.value = payload.holder.holder_id;
        await loadWallet();
        setMessage('Student added successfully.');
        addHolderForm.reset();
      } catch (err) {
        setMessage(err.message || String(err), true);
      }
    });
  </script>
</body>
</html>
