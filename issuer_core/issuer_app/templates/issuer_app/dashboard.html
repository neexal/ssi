<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Issuer Server Core</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #19202a;
      --muted: #667085;
      --line: #d7dde8;
      --panel: #ffffff;
      --bg: #eef2f7;
      --accent: #156c5a;
      --accent-2: #274c77;
      --danger: #9b2c2c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    main {
      width: min(1040px, calc(100% - 32px));
      margin: 32px auto;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 20px;
      align-items: start;
    }
    section, aside {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(26, 32, 44, 0.07);
    }
    h1, h2 { margin: 0; letter-spacing: 0; }
    h1 { font-size: 30px; line-height: 1.15; }
    h2 { font-size: 18px; margin-bottom: 14px; }
    p { color: var(--muted); line-height: 1.55; margin: 8px 0 0; }
    form {
      margin-top: 26px;
      display: grid;
      gap: 16px;
    }
    label {
      display: grid;
      gap: 7px;
      color: #344054;
      font-weight: 700;
      font-size: 14px;
    }
    input {
      width: 100%;
      border: 1px solid #b9c2d2;
      border-radius: 6px;
      padding: 12px 13px;
      font: inherit;
      color: var(--ink);
      background: #fbfcfe;
    }
    button {
      min-height: 46px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: white;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
    }
    button:disabled { opacity: .65; cursor: wait; }
    .status {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      width: fit-content;
      border: 1px solid #a7d7ca;
      background: #e8f6f2;
      color: #0b5d4d;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 800;
      font-size: 13px;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #15946f;
      box-shadow: 0 0 0 4px rgba(21, 148, 111, .14);
    }
    code {
      display: block;
      white-space: normal;
      word-break: break-all;
      color: var(--accent-2);
      background: #f3f6fa;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      margin-top: 10px;
      font-size: 13px;
    }
    pre {
      max-height: 360px;
      overflow: auto;
      background: #111827;
      color: #d1fae5;
      padding: 14px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.45;
    }
    .message {
      min-height: 22px;
      font-weight: 700;
      color: var(--accent-2);
    }
    .message.error { color: var(--danger); }
    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; margin-top: 18px; }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Issuer Server Core</h1>
      <p>Build a salted, signed identity credential and push it directly to the holder wallet running on port 8002.</p>
      <form id="issuer-form">
        <label>
          Identity ID
          <input name="ID" value="Nischal" autocomplete="off" required>
        </label>
        <label>
          Age
          <input name="age" value="27" inputmode="numeric" autocomplete="off" required>
        </label>
        <label>
          Status
          <input name="status" value="sta" autocomplete="off" required>
        </label>
        <button id="sign-button" type="submit">Sign & Export</button>
        <div id="message" class="message"></div>
      </form>
    </section>
    <aside>
      <h2>Asymmetric Key</h2>
      <span class="pill"><span class="dot"></span> RSA-2048 active</span>
      <code>Public key preview: {{ public_key_preview }}...</code>
      <div class="status">
        <h2>Last Credential</h2>
        <pre id="last-output">{}</pre>
      </div>
    </aside>
  </main>
  <script>
    const form = document.getElementById("issuer-form");
    const message = document.getElementById("message");
    const output = document.getElementById("last-output");
    const button = document.getElementById("sign-button");

    function setMessage(text, isError = false) {
      message.textContent = text;
      message.classList.toggle("error", isError);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      button.disabled = true;
      setMessage("Signing credential...");

      const claims = Object.fromEntries(new FormData(form).entries());
      try {
        const issueResponse = await fetch("/api/v1/issue/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ claims })
        });
        const credential = await issueResponse.json();
        if (!issueResponse.ok) {
          throw new Error(credential.error || "Issuer rejected the request.");
        }

        output.textContent = JSON.stringify(credential, null, 2);
        setMessage("Forwarding credential to holder wallet...");

        const holderResponse = await fetch("http://127.0.0.1:8002/api/v1/wallet/receive/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(credential)
        });
        const holderResult = await holderResponse.json();
        if (!holderResponse.ok) {
          throw new Error(holderResult.error || "Holder wallet rejected the credential.");
        }

        setMessage(`Credential stored in holder wallet as record #${holderResult.wallet_id}.`);
      } catch (error) {
        setMessage(error.message, true);
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
